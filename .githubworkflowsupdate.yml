name: Update schedule from VK

on:
  schedule:
    # Каждое воскресенье в 18:00 UTC (21:00 MSK)
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pandas openpyxl requests
      
      - name: Run parser
        run: python parser.py
      
      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add schedule.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update schedule $(date +'%d.%m.%Y')" && git push)
